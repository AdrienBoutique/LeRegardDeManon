<section class="admin-settings stack">
  <header class="card panel">
    <h1>Reglages</h1>
    <p>Mode de validation des demandes de rendez-vous.</p>
  </header>

  @if (errorMessage()) {
    <article class="card panel error-box">{{ errorMessage() }}</article>
  }
  @if (successMessage()) {
    <article class="card panel success-box">{{ successMessage() }}</article>
  }

  <article class="card panel">
    @if (loading()) {
      <p>Chargement...</p>
    } @else {
      <div class="mode-grid">
        <button
          type="button"
          class="mode-card"
          [class.active]="bookingMode() === 'MANUAL'"
          [disabled]="saving()"
          (click)="save('MANUAL')"
        >
          <h2>Validation manuelle</h2>
          <p>Toute demande arrive en attente puis est validee par l'administration.</p>
        </button>

        <button
          type="button"
          class="mode-card"
          [class.active]="bookingMode() === 'AUTO_INTELLIGENT'"
          [disabled]="saving()"
          (click)="save('AUTO_INTELLIGENT')"
        >
          <h2>Auto-confirmation intelligente</h2>
          <p>Confirmation automatique si creneau disponible, sinon la demande passe en attente.</p>
        </button>
      </div>

      <div class="toggle-row">
        <p class="hint">Affichage de la disponibilite sur le calendrier de reservation.</p>
        <div class="mode-grid">
          <button
            type="button"
            class="mode-card"
            [class.active]="availabilityDisplayMode() === 'dots'"
            [disabled]="saving()"
            (click)="saveAvailabilityDisplayMode('dots')"
          >
            <h2>Points de disponibilite</h2>
            <p>Affiche 1 a 3 points sous le jour selon le niveau de disponibilite.</p>
          </button>

          <button
            type="button"
            class="mode-card"
            [class.active]="availabilityDisplayMode() === 'colors'"
            [disabled]="saving()"
            (click)="saveAvailabilityDisplayMode('colors')"
          >
            <h2>Code couleur</h2>
            <p>Gris = indisponible, rouge = faible, jaune = moyen, vert = eleve.</p>
          </button>
        </div>
      </div>
    }
  </article>
</section>
